<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diario Xerecista — Entrar</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,600;1,9..144,900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --azul-profundo:#0D2C54;
    --azul-medio:#1B4D8F;
    --oro:#C9A24B;
    --papel:#F7F5F0;
    --tinta-suave:#B9C2D6;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--azul-profundo);
    color:var(--papel);
    font-family:'Space Mono',monospace;
  }

  .entrada{
    position:relative;
    height:100dvh;
    overflow:hidden;
    background:var(--azul-profundo);
  }

  /* ===== Foto duotono + Ken Burns ===== */
  .entrada-foto{
    position:absolute;
    inset:-3%;
    background:url('fotos/chapin.png') center 78%/cover no-repeat;
    filter:grayscale(1) contrast(1.15) brightness(0.85);
    animation:kenburns 24s ease-in-out infinite alternate;
  }
  @keyframes kenburns{
    from{transform:scale(1);}
    to{transform:scale(1.09);}
  }
  .entrada-duotono{
    position:absolute;
    inset:-3%;
    mix-blend-mode:color;
    background:linear-gradient(125deg, var(--azul-profundo) 15%, var(--azul-medio) 55%, var(--oro) 115%);
    opacity:0.92;
  }
  .entrada-scrim{
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle, rgba(201,162,75,0.14) 1px, transparent 1px) 0 0/26px 26px,
      linear-gradient(100deg, rgba(9,26,50,0.97) 0%, rgba(9,26,50,0.86) 32%, rgba(9,26,50,0.35) 58%, rgba(9,26,50,0.55) 100%),
      linear-gradient(0deg, rgba(9,26,50,0.9) 0%, rgba(9,26,50,0.15) 40%, rgba(9,26,50,0.05) 60%, rgba(9,26,50,0.7) 100%);
  }

  /* ===== Año fantasma ===== */
  .sello-fantasma{
    position:absolute;
    z-index:1;
    right:4vw;
    top:10%;
    display:flex;
    flex-direction:column;
    align-items:center;
    user-select:none;
    pointer-events:none;
  }
  .sello-fantasma img{
    width:min(11vw,130px);
    opacity:0.15;
    filter:grayscale(1) brightness(3);
    margin-bottom:-2vw;
  }
  .sello-fantasma span{
    font-family:'Fraunces',serif;
    font-weight:900;
    font-size:min(24vw,300px);
    line-height:1;
    color:rgba(247,245,240,0.09);
    letter-spacing:-0.02em;
  }

  /* ===== Marca, esquina superior ===== */
  .marca{
    position:absolute;
    z-index:3;
    top:32px;left:40px;
    display:flex;
    align-items:center;
    gap:10px;
    opacity:0;
    animation:subir 0.9s 0.1s cubic-bezier(.2,.8,.2,1) forwards;
  }
  .marca img{width:30px;height:30px;object-fit:contain;}
  .marca span{
    font-size:11px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:rgba(247,245,240,0.8);
  }

  /* ===== Contenido principal ===== */
  .entrada-contenido{
    position:relative;
    z-index:3;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:0 5vw 64px;
    max-width:900px;
  }
  .kicker{
    display:inline-block;
    font-family:'Fraunces',serif;
    font-style:italic;
    font-weight:500;
    font-size:clamp(16px,1.8vw,22px);
    letter-spacing:0.01em;
    color:var(--oro);
    margin-bottom:26px;
    opacity:0;
    animation:subir 0.9s 0.25s cubic-bezier(.2,.8,.2,1) forwards;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:900;
    font-size:clamp(52px,10vw,132px);
    line-height:0.92;
    letter-spacing:-0.02em;
  }
  h1 span{
    display:block;
    overflow:hidden;
  }
  h1 span b{
    display:block;
    font-weight:900;
    opacity:0;
    transform:translateY(100%);
    animation:subirTexto 0.9s cubic-bezier(.2,.8,.2,1) forwards;
  }
  h1 .l1 b{animation-delay:0.35s;}
  h1 .l2 b{
    color:var(--oro);
    font-style:italic;
    animation-delay:0.5s;
  }
  @keyframes subirTexto{
    to{opacity:1;transform:translateY(0);}
  }

  p.sub{
    max-width:440px;
    margin:26px 0 0;
    font-family:'Space Mono',monospace;
    font-size:14px;
    line-height:1.7;
    color:var(--tinta-suave);
    opacity:0;
    animation:subir 0.9s 0.65s cubic-bezier(.2,.8,.2,1) forwards;
  }

  .cta{
    display:inline-flex;
    align-items:center;
    gap:12px;
    margin-top:36px;
    padding:17px 34px;
    background:var(--oro);
    color:var(--azul-profundo);
    border-radius:2px;
    font-family:'Space Mono',monospace;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.14em;
    text-transform:uppercase;
    text-decoration:none;
    width:fit-content;
    opacity:0;
    animation:subir 0.9s 0.8s cubic-bezier(.2,.8,.2,1) forwards;
    transition:background 0.2s, color 0.2s, transform 0.2s;
  }
  .cta{
    animation:subir 0.9s 0.8s cubic-bezier(.2,.8,.2,1) forwards, respirar 2.8s 1.8s ease-in-out infinite;
  }
  .cta:hover{
    background:transparent;
    color:var(--oro);
    box-shadow:inset 0 0 0 1px var(--oro);
    transform:translateX(4px);
    animation:subir 0.9s 0.8s cubic-bezier(.2,.8,.2,1) forwards;
  }
  .cta svg{transition:transform 0.2s;}
  .cta:hover svg{transform:translateX(4px);}
  @keyframes respirar{
    0%,100%{box-shadow:0 0 0 0 rgba(201,162,75,0.45);}
    50%{box-shadow:0 0 22px 4px rgba(201,162,75,0.35);}
  }

  @keyframes subir{
    from{opacity:0;transform:translateY(14px);}
    to{opacity:1;transform:translateY(0);}
  }

  /* ===== Pie: estadio + desde ===== */
  .entrada-pie{
    position:absolute;
    z-index:3;
    left:0;right:0;bottom:24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 40px;
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:rgba(247,245,240,0.6);
    opacity:0;
    animation:subir 0.9s 1s cubic-bezier(.2,.8,.2,1) forwards;
  }
  .entrada-pie strong{color:var(--oro);}

  @media (max-width:760px){
    .sello-fantasma{right:2vw;top:3%;}
    .sello-fantasma img{width:22vw;}
    .sello-fantasma span{font-size:34vw;}
    .marca{top:22px;left:22px;}
    .entrada-contenido{padding:0 24px 48px;}
    .entrada-pie{padding:0 24px;flex-direction:column;align-items:flex-start;gap:6px;bottom:18px;}
  }
</style>
</head>
<body>

  <div class="entrada">
    <div class="entrada-foto"></div>
    <div class="entrada-duotono"></div>
    <div class="entrada-scrim"></div>

    <div class="sello-fantasma">
      <img src="fotos/escudos/escudo-xerez-cd-hd.png" alt="">
      <span>1947</span>
    </div>

    <div class="marca">
      <img src="fotos/escudos/escudo-xerez-cd-hd.png" alt="Escudo Xerez Club Deportivo">
      <span>Diario Xerecista</span>
    </div>

    <div class="entrada-contenido">
      <span class="kicker">Jerez, cuna del fútbol español</span>
      <h1>
        <span class="l1"><b>El sentimiento</b></span>
        <span class="l2"><b>que nos une</b></span>
      </h1>

      <p class="sub">Diario Xerecista, edición digital. Noticias, fichajes y crónicas del Xerez Club Deportivo, temporada 2026/27.</p>
      <a class="cta" href="index.html" onclick="try{sessionStorage.setItem('xdEntrada','1');}catch(e){}">
        Entrar
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>
    </div>

    <div class="entrada-pie">
      <span>Estadio Municipal de <strong>Chapín</strong></span>
      <span><strong>Desde</strong> 1947</span>
    </div>
  </div>

</body>
</html>
