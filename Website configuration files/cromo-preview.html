<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cromo Ismael Gutiérrez — Diario Xerecista</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#1a1a2e;
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;min-height:100vh;gap:20px;padding:40px;
  }
  .label{font-family:sans-serif;font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.1em;text-transform:uppercase;}

  .cromo{
    position:relative;width:280px;height:396px;
    border-radius:12px;overflow:hidden;
    box-shadow:0 12px 40px rgba(0,0,0,0.6);
    flex-shrink:0;
  }
  .cromo-bg{
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;display:block;
  }
  /* Foto dentro del marco octogonal */
  .cromo-foto-wrap{
    position:absolute;
    left:28.8%;top:4.2%;
    width:63%;height:67.5%;
    overflow:hidden;
    clip-path:polygon(9% 0%,91% 0%,100% 9%,100% 91%,91% 100%,9% 100%,0% 91%,0% 9%);
  }
  .cromo-foto{
    width:100%;height:100%;
    object-fit:cover;
    object-position:55% 0%;
  }
  /* Cubrir texto placeholder del PNG */
  .cromo-name-cover{
    position:absolute;
    top:74.5%;left:26%;width:64%;height:16%;
    background:#f4f0e8;
  }
  /* Badge values */
  .cromo-pos{
    position:absolute;
    top:48.5%;left:3%;width:22%;
    text-align:center;color:#fff;
    font-family:'Bebas Neue',Impact,sans-serif;
    font-size:15px;letter-spacing:0.06em;line-height:1;
  }
  .cromo-dorsal{
    position:absolute;
    top:58.5%;left:3%;width:22%;
    text-align:center;color:#fff;
    font-family:'Bebas Neue',Impact,sans-serif;
    font-size:17px;letter-spacing:0.04em;line-height:1;
  }
  .cromo-nac{
    position:absolute;
    top:68%;left:3%;width:22%;
    text-align:center;font-size:20px;line-height:1;
  }
  /* Nombre */
  .cromo-nombre{
    position:absolute;
    top:76%;left:26%;width:64%;
    text-align:center;color:#0D2C54;
    font-family:'Bebas Neue',Impact,sans-serif;
    font-size:22px;letter-spacing:0.08em;line-height:1;
  }
  .cromo-apellidos{
    position:absolute;
    top:82.5%;left:26%;width:64%;
    text-align:center;color:#0D2C54;
    font-family:'Bebas Neue',Impact,sans-serif;
    font-size:14px;letter-spacing:0.05em;line-height:1;
  }
</style>
</head>
<body>

<span class="label">Preview — Cromo Xerez CD 26/27</span>

<div class="cromo">
  <img class="cromo-bg" src="CromoXerez.png" alt="">
  <div class="cromo-foto-wrap">
    <img class="cromo-foto" src="fotos/plantilla/zeki-diaz.jpg" alt="Zeki Díaz">
  </div>
  <div class="cromo-name-cover"></div>
  <div class="cromo-pos">CC</div>
  <div class="cromo-dorsal">21</div>
  <div class="cromo-nac">🇪🇸</div>
  <div class="cromo-nombre">ZEKI</div>
  <div class="cromo-apellidos">DÍAZ</div>
</div>

<span class="label">Mándame más jugadores para completar la plantilla</span>

</body>
</html>
